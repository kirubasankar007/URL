openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: URL Shortener with Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: urls
    description: URL management
  - name: analytics
    description: Analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /urls:
    get:
      operationId: getUrls
      tags: [urls]
      summary: List all URLs for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShortUrl"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUrl
      tags: [urls]
      summary: Shorten a URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UrlInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortUrl"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /urls/{id}:
    delete:
      operationId: deleteUrl
      tags: [urls]
      summary: Delete a shortened URL
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /urls/{id}/analytics:
    get:
      operationId: getUrlAnalytics
      tags: [analytics]
      summary: Get click analytics for a URL
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UrlAnalytics"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get overall analytics summary for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string

    UrlInput:
      type: object
      required: [originalUrl]
      properties:
        originalUrl:
          type: string
          format: uri
        customCode:
          type: ["string", "null"]

    ShortUrl:
      type: object
      required: [id, originalUrl, shortCode, clickCount, createdAt]
      properties:
        id:
          type: integer
        originalUrl:
          type: string
        shortCode:
          type: string
        clickCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ClickEvent:
      type: object
      required: [id, clickedAt, userAgent, ipAddress]
      properties:
        id:
          type: integer
        clickedAt:
          type: string
          format: date-time
        userAgent:
          type: ["string", "null"]
        ipAddress:
          type: ["string", "null"]

    UrlAnalytics:
      type: object
      required: [url, clicks, clicksByDay]
      properties:
        url:
          $ref: "#/components/schemas/ShortUrl"
        clicks:
          type: array
          items:
            $ref: "#/components/schemas/ClickEvent"
        clicksByDay:
          type: array
          items:
            $ref: "#/components/schemas/DayCount"

    DayCount:
      type: object
      required: [date, count]
      properties:
        date:
          type: string
        count:
          type: integer

    AnalyticsSummary:
      type: object
      required: [totalUrls, totalClicks, topUrls]
      properties:
        totalUrls:
          type: integer
        totalClicks:
          type: integer
        topUrls:
          type: array
          items:
            $ref: "#/components/schemas/ShortUrl"
